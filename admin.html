<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주 로또 · 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-accent: #00754A;
    --house-green: #1E3932;
    --green-light: #d4e9e2;
    --gold: #cba258;
    --neutral-warm: #f2f0eb;
    --white: #ffffff;
    --input-border: #d6dbde;
    --hairline: #e7e7e7;
    --text-black: rgba(0, 0, 0, 0.87);
    --text-black-soft: rgba(0, 0, 0, 0.58);
    --text-white: #ffffff;
    --text-white-soft: rgba(255, 255, 255, 0.70);
    --card-shadow: 0 0 0.5px rgba(0,0,0,0.14), 0 1px 1px rgba(0,0,0,0.24);
    --font: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font); letter-spacing: -0.16px;
    background: var(--neutral-warm); color: var(--text-black);
    min-height: 100vh; padding: 2.4rem 1.6rem;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  .band {
    background: var(--house-green); border-radius: 12px 12px 0 0;
    padding: 24px 28px; box-shadow: var(--card-shadow);
  }
  .band h1 { color: var(--text-white); font-size: 22px; font-weight: 600; }
  .band p { color: var(--text-white-soft); font-size: 14px; margin-top: 4px; }

  .toolbar {
    background: var(--white); padding: 16px 20px;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    box-shadow: var(--card-shadow);
  }
  .toolbar input[type="password"] {
    font-family: var(--font); font-size: 14px; color: var(--text-black);
    border: 1px solid var(--input-border); border-radius: 50px;
    padding: 10px 16px; min-width: 200px; flex: 1;
  }
  .toolbar input:focus { outline: none; border-color: var(--green-accent); }
  .dates { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-black-soft); }
  .dates input[type="date"] {
    font-family: var(--font); font-size: 13px; color: var(--text-black);
    border: 1px solid var(--input-border); border-radius: 8px; padding: 8px 10px;
  }
  .dates input[type="date"]:focus { outline: none; border-color: var(--green-accent); }
  .btn.ghost { background: var(--white); color: var(--green-accent); border: 1px solid var(--green-accent); }
  .seg { display: flex; border: 1px solid var(--input-border); border-radius: 50px; overflow: hidden; }
  .seg button {
    font-family: var(--font); font-size: 14px; font-weight: 600;
    background: var(--white); color: var(--text-black-soft);
    border: none; padding: 9px 18px; cursor: pointer;
  }
  .seg button.active { background: var(--green-accent); color: #fff; }
  .btn {
    font-family: var(--font); font-size: 14px; font-weight: 600;
    background: var(--green-accent); color: #fff; border: none;
    border-radius: 50px; padding: 10px 22px; cursor: pointer;
    transition: transform 0.15s;
  }
  .btn:active { transform: scale(0.95); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .panel {
    background: var(--white); border-radius: 0 0 12px 12px;
    padding: 8px 4px 4px; box-shadow: var(--card-shadow);
    overflow-x: auto; min-height: 120px;
  }
  .status { padding: 24px 20px; color: var(--text-black-soft); font-size: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--hairline); vertical-align: top; }
  th { color: var(--text-black-soft); font-weight: 600; white-space: nowrap; position: sticky; top: 0; background: var(--white); }
  td.nums { white-space: nowrap; }
  .pill {
    display: inline-block; min-width: 24px; text-align: center;
    background: var(--green-light); color: var(--house-green);
    border-radius: 50px; padding: 2px 8px; margin: 1px; font-weight: 600; font-size: 12px;
  }
  .pill.bonus { background: #f6ecd6; color: #8a6a1f; }
  .muted { color: var(--text-black-soft); }
  .count { font-size: 13px; color: var(--text-black-soft); margin-left: auto; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="band">
      <h1>사주 로또 · 관리자</h1>
      <p>저장된 사주 추천 / 대화 기록을 조회합니다</p>
    </div>

    <div class="toolbar">
      <input type="password" id="token" placeholder="관리자 토큰 (ADMIN_TOKEN)" onkeydown="if(event.key==='Enter')load()">
      <div class="seg">
        <button id="tabSaju" class="active" onclick="setType('saju')">사주 기록</button>
        <button id="tabChat" onclick="setType('chat')">대화 기록</button>
      </div>
      <div class="dates">
        <input type="date" id="from" aria-label="시작일">
        <span>~</span>
        <input type="date" id="to" aria-label="종료일">
      </div>
      <button class="btn" id="loadBtn" onclick="load()">불러오기</button>
      <button class="btn ghost" id="csvBtn" onclick="exportCsv()" disabled>CSV 내보내기</button>
      <span class="count" id="count"></span>
    </div>

    <div class="panel">
      <div class="status" id="status">관리자 토큰을 입력하고 불러오기를 누르세요.</div>
      <table id="table" style="display:none;"><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>

<script>
  let type = 'saju';
  let lastRows = [];

  function setType(t) {
    type = t;
    document.getElementById('tabSaju').classList.toggle('active', t === 'saju');
    document.getElementById('tabChat').classList.toggle('active', t === 'chat');
    lastRows = [];
    document.getElementById('csvBtn').disabled = true;
    if (document.getElementById('token').value.trim()) load();
  }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }
  function fmtDate(s) {
    if (!s) return '';
    try { return new Date(s).toLocaleString('ko-KR'); } catch { return esc(s); }
  }

  async function load() {
    const token = document.getElementById('token').value.trim();
    const status = document.getElementById('status');
    const table = document.getElementById('table');
    const btn = document.getElementById('loadBtn');
    if (!token) { status.style.display = ''; table.style.display = 'none'; status.textContent = '관리자 토큰을 입력하세요.'; return; }

    btn.disabled = true;
    document.getElementById('csvBtn').disabled = true;
    status.style.display = ''; table.style.display = 'none';
    status.textContent = '불러오는 중…';
    document.getElementById('count').textContent = '';

    const from = document.getElementById('from').value;
    const to = document.getElementById('to').value;
    const params = new URLSearchParams({ type });
    if (from) params.set('from', from);
    if (to) params.set('to', to);

    try {
      const res = await fetch('/api/logs?' + params.toString(), { headers: { 'x-admin-token': token } });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '요청 실패');
      lastRows = data.rows || [];
      render(lastRows);
      document.getElementById('csvBtn').disabled = lastRows.length === 0;
    } catch (e) {
      status.style.display = ''; table.style.display = 'none';
      status.textContent = '⚠️ ' + e.message;
    } finally {
      btn.disabled = false;
    }
  }

  function exportCsv() {
    if (!lastRows.length) return;
    const cols = type === 'saju'
      ? [['created_at', '시각'], ['birth_date', '생년월일'], ['birth_time', '시간'],
         ['calendar', '양력음력'], ['gender', '성별'], ['numbers', '번호'],
         ['bonus', '보너스'], ['saju', '사주풀이'], ['advice', '운세']]
      : [['created_at', '시각'], ['question', '질문'], ['answer', '답변']];

    const cell = v => {
      if (Array.isArray(v)) v = v.join(' ');
      const s = String(v == null ? '' : v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const header = cols.map(c => cell(c[1])).join(',');
    const body = lastRows.map(r => cols.map(c => cell(r[c[0]])).join(',')).join('\n');
    const csv = '﻿' + header + '\n' + body; // BOM: 엑셀 한글 깨짐 방지

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (type === 'saju' ? 'saju_logs' : 'chat_logs') + '.csv';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function render(rows) {
    const status = document.getElementById('status');
    const table = document.getElementById('table');
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');
    document.getElementById('count').textContent = rows.length + '건';

    if (!rows.length) {
      status.style.display = ''; table.style.display = 'none';
      status.textContent = '저장된 기록이 없습니다.';
      return;
    }

    let head, body;
    if (type === 'saju') {
      head = ['시각', '생년월일', '시간', '양력/음력', '성별', '추천 번호', '사주 풀이'];
      body = rows.map(r => {
        const nums = (r.numbers || []).map(n => `<span class="pill">${esc(n)}</span>`).join('') +
          (r.bonus != null ? `<span class="pill bonus">${esc(r.bonus)}</span>` : '');
        return `<tr>
          <td class="muted">${fmtDate(r.created_at)}</td>
          <td>${esc(r.birth_date)}</td>
          <td>${esc(r.birth_time)}</td>
          <td>${esc(r.calendar)}</td>
          <td>${esc(r.gender)}</td>
          <td class="nums">${nums}</td>
          <td>${esc(r.saju)}${r.advice ? '<br><span class="muted">💡 ' + esc(r.advice) + '</span>' : ''}</td>
        </tr>`;
      }).join('');
    } else {
      head = ['시각', '질문', '답변'];
      body = rows.map(r => `<tr>
        <td class="muted">${fmtDate(r.created_at)}</td>
        <td>${esc(r.question)}</td>
        <td>${esc(r.answer)}</td>
      </tr>`).join('');
    }

    thead.innerHTML = '<tr>' + head.map(h => `<th>${h}</th>`).join('') + '</tr>';
    tbody.innerHTML = body;
    status.style.display = 'none';
    table.style.display = '';
  }
</script>
</body>
</html>
